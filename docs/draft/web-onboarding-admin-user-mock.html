<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Remote Onboarding Mock</title>
    <style>
      :root {
        --bg: #efe8dc;
        --shell: rgba(255, 251, 245, 0.96);
        --panel: #fffdf9;
        --line: rgba(55, 43, 30, 0.09);
        --text: #1f2328;
        --muted: #6b7280;
        --brand: #0f766e;
        --brand-soft: rgba(15, 118, 110, 0.12);
        --warn: #b45309;
        --warn-soft: rgba(180, 83, 9, 0.14);
        --danger: #b42318;
        --danger-soft: rgba(180, 35, 24, 0.14);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --radius-pill: 999px;
        --shadow: 0 28px 64px rgba(34, 24, 14, 0.14);
        --font-sans: "Avenir Next", "Segoe UI Variable", "PingFang SC", "Noto Sans SC", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font-sans);
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.18), transparent 28%),
          radial-gradient(circle at top right, rgba(180, 83, 9, 0.16), transparent 34%),
          linear-gradient(180deg, #faf6ef 0%, var(--bg) 100%);
      }

      h1,
      h2,
      h3,
      h4,
      p {
        margin: 0;
      }

      code {
        padding: 1px 6px;
        border-radius: 999px;
        background: rgba(55, 43, 30, 0.08);
        font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", monospace;
        font-size: 0.92em;
      }

      button,
      input {
        font: inherit;
      }

      .page {
        width: min(1200px, calc(100% - 24px));
        margin: 18px auto 36px;
      }

      .app-shell {
        border: 1px solid rgba(55, 43, 30, 0.08);
        border-radius: 32px;
        background: var(--shell);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: center;
        padding: 18px 22px;
        border-bottom: 1px solid var(--line);
        background: rgba(253, 248, 241, 0.96);
      }

      .brand {
        display: flex;
        gap: 14px;
        align-items: center;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 16px;
        background: linear-gradient(135deg, #0f766e, #164e63);
        color: #fff;
        font-weight: 800;
        font-size: 15px;
      }

      .brand small {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 4px;
      }

      .brand strong {
        font-size: 17px;
      }

      .status-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .status-chip {
        min-height: 34px;
        display: inline-flex;
        align-items: center;
        padding: 0 12px;
        border-radius: var(--radius-pill);
        font-size: 12px;
        font-weight: 700;
      }

      .status-chip.ok {
        color: var(--brand);
        background: var(--brand-soft);
      }

      .status-chip.warn {
        color: var(--warn);
        background: var(--warn-soft);
      }

      .status-chip.danger {
        color: var(--danger);
        background: var(--danger-soft);
      }

      .flash {
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        font-size: 14px;
        line-height: 1.6;
      }

      .flash.ok {
        background: rgba(15, 118, 110, 0.1);
        color: var(--brand);
      }

      .flash.warn {
        background: rgba(180, 83, 9, 0.14);
        color: var(--warn);
      }

      .layout {
        display: grid;
        grid-template-columns: 250px minmax(0, 1fr);
        min-height: 760px;
      }

      .sidebar {
        padding: 20px;
        border-right: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(248, 240, 230, 0.88), rgba(255, 251, 246, 0.96));
      }

      .sidebar-title {
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .step-list {
        display: grid;
        gap: 10px;
      }

      .step-item {
        padding: 13px 14px;
        border-radius: 18px;
        border: 1px solid transparent;
        background: rgba(255, 255, 255, 0.78);
      }

      .step-item.current {
        border-color: rgba(15, 118, 110, 0.22);
        background: rgba(15, 118, 110, 0.12);
      }

      .step-item.done {
        background: rgba(15, 118, 110, 0.08);
      }

      .step-item small {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .step-item strong {
        display: block;
        font-size: 14px;
      }

      .content {
        padding: 22px;
        display: grid;
        gap: 16px;
        align-content: start;
      }

      .hero {
        padding: 22px;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(15, 118, 110, 0.12);
        background: linear-gradient(145deg, rgba(15, 118, 110, 0.1), rgba(255, 253, 249, 0.98));
      }

      .hero h1 {
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.08;
      }

      .hero p {
        margin-top: 12px;
        color: var(--muted);
        line-height: 1.7;
        font-size: 16px;
      }

      .callout {
        padding: 18px;
        border-radius: 20px;
        border: 1px solid transparent;
      }

      .callout.ok {
        background: var(--brand-soft);
        border-color: rgba(15, 118, 110, 0.12);
      }

      .callout.warn {
        background: var(--warn-soft);
        border-color: rgba(180, 83, 9, 0.14);
      }

      .callout.danger {
        background: var(--danger-soft);
        border-color: rgba(180, 35, 24, 0.14);
      }

      .callout strong {
        display: block;
        font-size: 16px;
      }

      .callout p {
        margin-top: 8px;
        line-height: 1.65;
        color: rgba(31, 35, 40, 0.8);
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .grid.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .card {
        padding: 18px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.9);
      }

      .card h2,
      .card h3 {
        font-size: 18px;
      }

      .card p {
        margin-top: 10px;
        color: var(--muted);
        line-height: 1.65;
      }

      .pill {
        display: inline-flex;
        min-height: 30px;
        align-items: center;
        padding: 0 10px;
        border-radius: var(--radius-pill);
        font-size: 12px;
        font-weight: 700;
      }

      .pill.ok {
        background: var(--brand-soft);
        color: var(--brand);
      }

      .pill.warn {
        background: var(--warn-soft);
        color: var(--warn);
      }

      .pill.danger {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .pill.neutral {
        background: rgba(107, 114, 128, 0.12);
        color: #4b5563;
      }

      .list {
        margin: 14px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 12px;
      }

      .list li {
        padding-top: 12px;
        border-top: 1px solid rgba(55, 43, 30, 0.08);
      }

      .list li:first-child {
        padding-top: 0;
        border-top: 0;
      }

      .list strong {
        display: block;
        font-size: 15px;
      }

      .list span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        line-height: 1.6;
      }

      .select-card {
        cursor: pointer;
        transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
      }

      .select-card:hover {
        transform: translateY(-1px);
        border-color: rgba(15, 118, 110, 0.18);
      }

      .select-card.selected {
        border-color: rgba(15, 118, 110, 0.24);
        box-shadow: inset 0 0 0 1px rgba(15, 118, 110, 0.08);
      }

      .meta-list {
        margin: 16px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 10px;
      }

      .meta-list li {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        padding-top: 10px;
        border-top: 1px solid rgba(55, 43, 30, 0.08);
        color: var(--muted);
        font-size: 14px;
      }

      .meta-list li:first-child {
        padding-top: 0;
        border-top: 0;
      }

      .meta-list span:last-child {
        color: var(--text);
        font-weight: 600;
        text-align: right;
      }

      .summary-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .summary-tile {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.9);
      }

      .summary-tile strong {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      .summary-tile span {
        display: block;
        line-height: 1.6;
      }

      .field-grid {
        display: grid;
        gap: 14px;
      }

      .field label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      .field small {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        line-height: 1.5;
      }

      .input {
        width: 100%;
        min-height: 48px;
        padding: 0 14px;
        border-radius: 16px;
        border: 1px solid rgba(55, 43, 30, 0.12);
        background: rgba(255, 255, 255, 0.94);
        color: var(--text);
      }

      .code-block {
        margin: 16px 0 0;
        padding: 16px;
        border-radius: 18px;
        border: 1px solid rgba(55, 43, 30, 0.08);
        background: rgba(246, 241, 232, 0.88);
        overflow: auto;
        color: #3d3328;
        font-size: 13px;
        line-height: 1.65;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .qr-box {
        display: grid;
        justify-items: center;
        gap: 18px;
        padding: 26px;
        border-radius: 24px;
        border: 1px dashed rgba(15, 118, 110, 0.2);
        background: rgba(255, 255, 255, 0.9);
        text-align: center;
      }

      .qr {
        width: min(240px, 62vw);
        aspect-ratio: 1;
        border-radius: 22px;
        border: 12px solid #fff;
        background:
          linear-gradient(90deg, rgba(15, 118, 110, 0.14) 10%, transparent 10%, transparent 20%, rgba(15, 118, 110, 0.14) 20%, rgba(15, 118, 110, 0.14) 30%, transparent 30%, transparent 40%, rgba(15, 118, 110, 0.14) 40%, rgba(15, 118, 110, 0.14) 50%, transparent 50%, transparent 60%, rgba(15, 118, 110, 0.14) 60%, rgba(15, 118, 110, 0.14) 70%, transparent 70%, transparent 80%, rgba(15, 118, 110, 0.14) 80%),
          linear-gradient(rgba(15, 118, 110, 0.14) 10%, transparent 10%, transparent 20%, rgba(15, 118, 110, 0.14) 20%, rgba(15, 118, 110, 0.14) 30%, transparent 30%, transparent 40%, rgba(15, 118, 110, 0.14) 40%, rgba(15, 118, 110, 0.14) 50%, transparent 50%, transparent 60%, rgba(15, 118, 110, 0.14) 60%, rgba(15, 118, 110, 0.14) 70%, transparent 70%, transparent 80%, rgba(15, 118, 110, 0.14) 80%);
      }

      .footer {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .button {
        min-height: 46px;
        padding: 0 18px;
        border-radius: var(--radius-pill);
        border: 1px solid rgba(55, 43, 30, 0.08);
        background: rgba(255, 255, 255, 0.9);
        color: var(--text);
        font-weight: 700;
        cursor: pointer;
      }

      .button.primary {
        border-color: transparent;
        background: linear-gradient(135deg, #0f766e, #115e59);
        color: #fff;
      }

      .button.ghost {
        background: transparent;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .step-list {
          display: flex;
          overflow-x: auto;
        }

        .step-item {
          min-width: 172px;
        }

        .grid.two,
        .grid.three,
        .summary-grid {
          grid-template-columns: 1fr;
        }

        .topbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .status-row {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="app-shell" id="app"></div>
    </div>

    <script>
      const defaultRoute = "setup/env";
      const basicScopesImport = JSON.stringify(
        {
          scopes: {
            tenant: [
              "im:message",
              "im:message.group_at_msg:readonly",
              "im:message.p2p_msg:readonly",
              "im:message.reactions:read",
              "im:message.reactions:write_only",
              "im:message:send_as_bot",
              "im:resource",
            ],
            user: [],
          },
        },
        null,
        2,
      );
      const state = {
        setupSource: "new",
        adminSource: "new",
        setupBasicReady: false,
        adminBasicReady: false,
        existingAppName: "",
        existingAppId: "",
        existingAppSecret: "",
        adminExistingAppName: "",
        adminExistingAppId: "",
        adminExistingAppSecret: "",
        autostartDecision: "later",
        vscodeDecision: "later",
        adminAddedApp: null,
        flash: null,
        flashTimer: null,
      };

      function route() {
        return window.location.hash.replace(/^#/, "") || defaultRoute;
      }

      function go(nextRoute) {
        window.location.hash = nextRoute;
      }

      function showFlash(tone, message) {
        if (state.flashTimer) {
          window.clearTimeout(state.flashTimer);
        }
        state.flash = { tone, message };
        state.flashTimer = window.setTimeout(() => {
          state.flash = null;
          render();
        }, 2200);
        render();
      }

      function sourceValue(scope) {
        return scope === "setup" ? state.setupSource : state.adminSource;
      }

      function selectSource(scope, value) {
        if (scope === "setup") {
          state.setupSource = value;
          state.setupBasicReady = false;
        } else {
          state.adminSource = value;
          state.adminBasicReady = false;
        }
        render();
      }

      function setupSourceNext() {
        switch (state.setupSource) {
          case "existing":
            return "setup/existing";
          case "detected":
            return "setup/detected";
          default:
            return "setup/new-qr";
        }
      }

      function adminSourceNext() {
        switch (state.adminSource) {
          case "existing":
            return "admin/add/existing";
          case "detected":
            return "admin/add/detected";
          default:
            return "admin/add/new-qr";
        }
      }

      function finishAdminAdd() {
        let name = "新飞书应用";
        if (state.adminSource === "existing") {
          name = state.adminExistingAppName.trim() || "已有飞书应用";
        } else if (state.adminSource === "detected") {
          name = "当前已检测到的飞书应用";
        } else {
          name = "新接入飞书应用";
        }
        state.adminAddedApp = {
          name,
          status: "可用，但还有待补全项",
        };
        showFlash("ok", "新的飞书应用已经加入管理页。");
        go("admin/home");
      }

      function stepItem(step, title, kind) {
        return `
          <div class="step-item ${kind}">
            <small>${step}</small>
            <strong>${title}</strong>
          </div>
        `;
      }

      function statusChip(text, tone) {
        return `<span class="status-chip ${tone}">${text}</span>`;
      }

      function button(label, attrs, primary = false) {
        return `<button class="button${primary ? " primary" : ""}" ${attrs}>${label}</button>`;
      }

      function shell({ kicker, title, status, navTitle, navItems, body }) {
        return `
          <div class="topbar">
            <div class="brand">
              <div class="brand-mark">CR</div>
              <div>
                <small>${kicker}</small>
                <strong>${title}</strong>
              </div>
            </div>
            <div class="status-row">${status.join("")}</div>
          </div>
          ${state.flash ? `<div class="flash ${state.flash.tone}">${state.flash.message}</div>` : ""}
          <div class="layout">
            <aside class="sidebar">
              <div class="sidebar-title">${navTitle}</div>
              <div class="step-list">${navItems.join("")}</div>
            </aside>
            <main class="content">${body}</main>
          </div>
        `;
      }

      function setupNav(current) {
        const order = ["env", "status", "source", "connect", "capability", "finish"];
        const currentIndex = order.indexOf(current);
        const items = [
          { key: "env", step: "步骤 1", title: "环境检查" },
          { key: "status", step: "步骤 2", title: "当前状态" },
          { key: "source", step: "步骤 3", title: "接入飞书应用" },
          { key: "capability", step: "步骤 4", title: "能力检查" },
          { key: "finish", step: "步骤 5", title: "完成" },
        ];
        return items.map((item) => {
          const index = order.indexOf(item.key);
          const kind = index < currentIndex ? "done" : index === currentIndex ? "current" : "";
          return stepItem(item.step, item.title, kind);
        });
      }

      function adminNav(current) {
        const order = ["home", "detail", "add"];
        const currentIndex = order.indexOf(current);
        const items = [
          { key: "home", step: "管理", title: "当前状态" },
          { key: "detail", step: "飞书应用", title: "应用详情" },
          { key: "add", step: "新增", title: "再接一个飞书应用" },
        ];
        return items.map((item) => {
          const index = order.indexOf(item.key);
          const kind = index < currentIndex ? "done" : index === currentIndex ? "current" : "";
          return stepItem(item.step, item.title, kind);
        });
      }

      function renderSetupEnv() {
        return shell({
          kicker: "Setup",
          title: "Codex Remote",
          status: [statusChip("基础环境已通过", "ok")],
          navTitle: "开通流程",
          navItems: setupNav("env"),
          body: `
            <section class="hero">
              <h1>这台机器已经准备好了</h1>
              <p>基础环境检查已经通过。接下来可以继续配置飞书应用。</p>
            </section>

            <div class="callout ok">
              <strong>可以继续</strong>
              <p>这台机器已经满足基础要求。下面我们会先看看当前有没有已经可用的飞书应用。</p>
            </div>

            <div class="footer">
              ${button("继续", 'data-go="setup/status"', true)}
            </div>
          `,
        });
      }

      function renderSetupStatus() {
        return shell({
          kicker: "Setup",
          title: "Codex Remote",
          status: [statusChip("基础环境已通过", "ok"), statusChip("当前没有可用飞书应用", "warn")],
          navTitle: "开通流程",
          navItems: setupNav("status"),
          body: `
            <section class="hero">
              <h1>先看一下当前状态</h1>
              <p>我们先帮你看一眼，这台机器上现在有没有已经可用的飞书应用。</p>
            </section>

            <div class="callout warn">
              <strong>当前没有检测到可用飞书应用</strong>
              <p>你还没有可以直接使用的飞书应用。下一步需要先接入一个。</p>
            </div>

            <div class="grid two">
              <section class="card">
                <h2>当前情况</h2>
                <ul class="list">
                  <li>
                    <strong>基础环境</strong>
                    <span>已经通过，可以继续。</span>
                  </li>
                  <li>
                    <strong>飞书应用</strong>
                    <span>还没有检测到可直接使用的对象。</span>
                  </li>
                </ul>
              </section>

              <section class="card">
                <h2>下一步</h2>
                <ul class="list">
                  <li>
                    <strong>开始接入飞书应用</strong>
                    <span>你可以新建、接入已有，或者继续使用已检测到的对象。</span>
                  </li>
                </ul>
              </section>
            </div>

            <div class="footer">
              ${button("返回上一步", 'data-go="setup/env"')}
              ${button("开始接入飞书应用", 'data-go="setup/source"', true)}
            </div>
          `,
        });
      }

      function renderSourceCards(scope) {
        const selected = sourceValue(scope);
        return `
          <div class="grid three">
            <article class="card select-card ${selected === "new" ? "selected" : ""}" data-select-source="${scope}:new">
              <span class="pill ok">推荐</span>
              <h3>新建飞书应用</h3>
              <p>适合第一次接入。系统会引导你扫码创建，并自动带回凭据。</p>
            </article>
            <article class="card select-card ${selected === "existing" ? "selected" : ""}" data-select-source="${scope}:existing">
              <span class="pill neutral">已有配置</span>
              <h3>接入已有飞书应用</h3>
              <p>适合你已经在飞书后台建好应用，只需要把它接到这台机器上的情况。</p>
            </article>
            <article class="card select-card ${selected === "detected" ? "selected" : ""}" data-select-source="${scope}:detected">
              <span class="pill neutral">已检测到</span>
              <h3>使用当前已检测到的飞书应用</h3>
              <p>适合系统已经发现一个飞书应用，而且你想直接继续用它的情况。</p>
            </article>
          </div>
        `;
      }

      function renderSetupSource() {
        return shell({
          kicker: "Setup",
          title: "Codex Remote",
          status: [statusChip("基础环境已通过", "ok"), statusChip("正在选择来源", "ok")],

                    <span>最近一次验证通过。</span>
                  </li>
                </ul>
              </section>

              <section class="card">
                <h2>待补全项</h2>
                <ul class="list">
                  <li>
                    <strong>单聊状态提醒</strong>
                    <span>可稍后处理。</span>
                  </li>
                  <li>
                    <strong>Markdown 预览</strong>
                    <span>可稍后处理。</span>
                  </li>
                </ul>
              </section>
            </div>

            <div class="footer">
              ${button("返回管理页", 'data-go="admin/home"')}
              ${button("重新验证连接", 'data-action="reverify-main"', true)}
            </div>
          `,
        });
      }

      function renderAdminAppExternal() {
        return shell({
          kicker: "Admin",
          title: "Codex Remote",
          status: [statusChip("外部接管", "warn"), statusChip("只读", "warn")],
          navTitle: "飞书应用详情",
          navItems: adminNav("detail"),
          body: `
            <section class="hero">
              <h1>团队生产助手</h1>
              <p>这个飞书应用已经存在。这里不会修改它在飞书平台上的原始配置。</p>
            </section>

            <article class="card">
              <span class="pill warn">只读</span>
              <ul class="meta-list">
                <li><span>当前状态</span><span>可用</span></li>
                <li><span>配置来源</span><span>外部接管</span></li>
                <li><span>当前可做</span><span>查看状态、重新验证、换一个飞书应用</span></li>
              </ul>
            </article>

            <div class="footer">
              ${button("返回管理页", 'data-go="admin/home"')}
              ${button("重新验证连接", 'data-action="reverify-external"', true)}
            </div>
          `,
        });
      }

      function renderAdminAppNew() {
        return shell({
          kicker: "Admin",
          title: "Codex Remote",
          status: [statusChip("新加入", "ok"), statusChip("还有待补全项", "warn")],
          navTitle: "飞书应用详情",
          navItems: adminNav("detail"),
          body: `
            <section class="hero">
              <h1>${state.adminAddedApp ? state.adminAddedApp.name : "新飞书应用"}</h1>
              <p>这个飞书应用已经加入管理页。你现在可以继续补全增强项，也可以直接开始使用。</p>
            </section>

            <div class="callout ok">
              <strong>已经接入完成</strong>
              <p>核心连接已经打通。剩下的增强项可以以后再补。</p>
            </div>

            <div class="footer">
              ${button("返回管理页", 'data-go="admin/home"')}
            </div>
          `,
        });
      }

      function renderAdminAddSource() {
        return shell({
          kicker: "Admin",
          title: "Codex Remote",
          status: [statusChip("新增飞书应用", "ok")],
          navTitle: "新增飞书应用",
          navItems: adminNav("add"),
          body: `
            <section class="hero">
              <h1>新增飞书应用</h1>
              <p>再接入一个新的飞书应用，或继续使用当前已经检测到的飞书应用。</p>
            </section>

            ${renderSourceCards("admin")}

            <div class="footer">
              ${button("返回管理页", 'data-go="admin/home"')}
              ${button("下一步", 'data-action="admin-source-next"', true)}
            </div>
          `,
        });
      }

      function renderAdminAddNewQR() {
        return shell({
          kicker: "Admin",
          title: "Codex Remote",
          status: [statusChip("新增飞书应用", "ok"), statusChip("正在等待扫码完成", "ok")],
          navTitle: "新增飞书应用",
          navItems: adminNav("add"),
          body: renderQRCodePage({
            nextRoute: "admin/add/new-created",
            backRoute: "admin/add/source",
            title: "用飞书扫码创建应用",
            subtitle: "请用飞书扫码。系统会自动创建应用、带回凭据，并在完成后继续验证连接。",
            statusText: "正在等待扫码完成",
          }),
        });
      }

      function renderAdminAddNewCreated() {
        return shell({
          kicker: "Admin",
          title: "Codex Remote",
          status: [statusChip("飞书应用已经创建好了", "ok")],
          navTitle: "新增飞书应用",
          navItems: adminNav("add"),
          body: `
            <section class="hero">
              <h1>飞书应用已经创建好了</h1>
              <p>我们已经帮你把这个应用接进来了。下一步会继续检查它现在能不能直接开始使用。</p>
            </section>

            <div class="summary-grid">
              <article class="summary-tile">
                <strong>当前应用</strong>
                <span>新增飞书应用</span>
              </article>
              <article class="summary-tile">
                <strong>已完成</strong>
                <span>应用已经创建，凭据已经带回，当前飞书应用已经接入本机。</span>
              </article>
            </div>

            <div class="footer">
              ${button("返回上一步", 'data-go="admin/add/new-qr"')}
              ${button("继续", 'data-go="admin/add/connected"', true)}
            </div>
          `,
        });
      }

      function renderAdminAddExisting() {
        return shell({
          kicker: "Admin",
          title: "Codex Remote",
          status: [statusChip("新增飞书应用", "ok")],
          navTitle: "新增飞书应用",
          navItems: adminNav("add"),
          body: `
            <section class="hero">
              <h1>接入已有飞书应用</h1>
              <p>如果你已经在飞书后台配好了这个应用，这一步只需要把它接进来。</p>
            </section>

            ${existingForm("admin")}

            <div class="footer">
              ${button("返回重新选择", 'data-go="admin/add/source"')}
              ${button("保存并验证", 'data-go="admin/add/connected"', true)}
            </div>
          `,
        });
      }

      function renderAdminAddDetected() {
        return shell({
          kicker: "Admin",
          title: "Codex Remote",
          status: [statusChip("新增飞书应用", "ok"), statusChip("已检测到对象", "ok")],
          navTitle: "新增飞书应用",
          navItems: adminNav("add"),
          body: `
            <section class="hero">
              <h1>继续使用当前已检测到的飞书应用</h1>
              <p>系统已经发现了一个飞书应用。你可以先验证它现在是否可用。</p>
            </section>

            <article class="card">
              <span class="pill ok">已检测到</span>
              <h3 style="margin-top: 14px;">当前已检测到的飞书应用</h3>
              <p>这里会继续使用已经发现的对象，不需要重新填写凭据。</p>
            </article>

            <div class="footer">
              ${button("换一个飞书应用", 'data-go="admin/add/source"')}
              ${button("验证当前飞书应用", 'data-go="admin/add/capability"', true)}
            </div>
          `,
        });
      }

      function renderAdminAddConnected() {
        return shell({
          kicker: "Admin",
          title: "Codex Remote",
          status: [statusChip("连接成功", "ok")],
          navTitle: "新增飞书应用",
          navItems: adminNav("add"),
          body: renderConnected("连接成功", "这个飞书应用已经接到当前机器，可以继续下一步。", "admin/add/capability", "admin/add/source"),
        });
      }

      function renderAdminAddCapability() {
        const backRoute = state.adminSource === "detected" ? "admin/add/detected" : "admin/add/connected";
        return shell({
          kicker: "Admin",
          title: "Codex Remote",
          status: [statusChip("现在已经可以开始使用", "ok"), statusChip("还有待补全项", "warn")],
          navTitle: "新增飞书应用",
          navItems: adminNav("add"),
          body: `
            <section class="hero">
              <h1>再确认一下，现在已经能不能开始用</h1>
              <p>基础项需要先准备好；增强项如果现在还没补齐，也可以以后再处理。</p>
            </section>

            <div class="callout ok">
              <strong>现在已经可以开始使用</strong>
              <p>还有一些增强项可以稍后补齐，不影响你现在开始对话。</p>
            </div>

            ${capabilityCards()}

            <div class="footer">
              ${button("返回上一步", `data-go="${backRoute}"`)}
              ${button("完成并回到管理页", 'data-action="finish-admin-add"', true)}
            </div>
          `,
        });
      }

      function renderRoute() {
        switch (route()) {
          case "setup/env":
            return renderSetupEnv();
          case "setup/status":
            return renderSetupStatus();
          case "setup/source":
            return renderSetupSource();
          case "setup/new-qr":
            return renderSetupNewQR();
          case "setup/new-created":
            return renderSetupNewCreated();
          case "setup/existing":
            return renderSetupExisting();
          case "setup/detected":
            return renderSetupDetected();
          case "setup/connected":
            return renderSetupConnected();
          case "setup/capability":
            return renderSetupCapability();
          case "setup/basic-guidance":
            return renderSetupBasicGuidance();
          case "setup/autostart":
            return renderAutostart();
          case "setup/vscode":
            return renderVSCode();
          case "setup/finish":
            return renderSetupFinish();
          case "admin/home":
            return renderAdminHome();
          case "admin/app/main":
            return renderAdminAppMain();
          case "admin/app/external":
            return renderAdminAppExternal();
          case "admin/app/new":
            return renderAdminAppNew();
          case "admin/add/source":
            return renderAdminAddSource();
          case "admin/add/new-qr":
            return renderAdminAddNewQR();
          case "admin/add/new-created":
            return renderAdminAddNewCreated();
          case "admin/add/existing":
            return renderAdminAddExisting();
          case "admin/add/detected":
            return renderAdminAddDetected();
          case "admin/add/connected":
            return renderAdminAddConnected();
          case "admin/add/capability":
            return renderAdminAddCapability();
          default:
            go(defaultRoute);
            return "";
        }
      }

      function render() {
        document.getElementById("app").innerHTML = renderRoute();
      }

      document.addEventListener("click", (event) => {
        const target = event.target.closest("[data-go],[data-action],[data-select-source]");
        if (!target) {
          return;
        }

        if (target.dataset.go) {
          go(target.dataset.go);
          return;
        }

        if (target.dataset.selectSource) {
          const [scope, value] = target.dataset.selectSource.split(":");
          selectSource(scope, value);
          return;
        }

        switch (target.dataset.action) {
          case "setup-source-next":
            go(setupSourceNext());
            return;
          case "admin-source-next":
            go(adminSourceNext());
            return;
          case "refresh-qr":
            showFlash("ok", "二维码已刷新。");
            return;
          case "open-feishu-console":
            window.open("https://open.feishu.cn/app", "_blank", "noopener");
            showFlash("ok", "已打开飞书后台。");
            return;
          case "copy-basic-permissions":
            showFlash("ok", "基础权限配置已经准备好，可以粘贴到飞书后台。");
            return;
          case "setup-basic-ready":
            state.setupBasicReady = true;
            showFlash("ok", "已经重新检查基础对话与交互。");
            go("setup/capability");
            return;
          case "autostart-enable":
            state.autostartDecision = "enabled";
            go("setup/vscode");
            return;
          case "autostart-later":
            state.autostartDecision = "later";
            go("setup/vscode");
            return;
          case "vscode-current":
            state.vscodeDecision = "current";
            go("setup/finish");
            return;
          case "vscode-later":
            state.vscodeDecision = "later";
            go("setup/finish");
            return;
          case "vscode-other":
            state.vscodeDecision = "other";
            go("setup/finish");
            return;
          case "reverify-main":
            showFlash("ok", "连接验证通过。");
            return;
          case "reverify-external":
            showFlash("ok", "当前飞书应用验证通过。");
            return;
          case "finish-admin-add":
            finishAdminAdd();
            return;
          default:
            return;
        }
      });

      document.addEventListener("input", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLInputElement) || !target.dataset.model) {
          return;
        }
        state[target.dataset.model] = target.value;
      });

      window.addEventListener("hashchange", render);

      if (!window.location.hash) {
        go(defaultRoute);
      } else {
        render();
      }
    </script>
  </body>
</html>
