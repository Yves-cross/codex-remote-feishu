<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Remote Web Onboarding/Admin Mock</title>
    <style>
      :root {
        --bg: #f4efe7;
        --bg-strong: #efe5d8;
        --panel: rgba(255, 250, 244, 0.86);
        --panel-strong: #fffaf2;
        --panel-border: rgba(67, 53, 39, 0.12);
        --text: #1f2833;
        --muted: #5d6773;
        --brand: #0f766e;
        --brand-soft: rgba(15, 118, 110, 0.12);
        --warn: #b45309;
        --warn-soft: rgba(180, 83, 9, 0.12);
        --danger: #b42318;
        --danger-soft: rgba(180, 35, 24, 0.12);
        --shadow: 0 28px 60px rgba(44, 36, 28, 0.12);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --radius-sm: 999px;
        --font-sans: "Avenir Next", "Segoe UI Variable", "PingFang SC", "Noto Sans SC", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: var(--font-sans);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.18), transparent 28%),
          radial-gradient(circle at top right, rgba(180, 83, 9, 0.14), transparent 30%),
          linear-gradient(180deg, #fbf7f2 0%, var(--bg) 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: auto auto -120px -120px;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: rgba(15, 118, 110, 0.08);
        filter: blur(20px);
        pointer-events: none;
      }

      a {
        color: inherit;
      }

      .page {
        width: min(1360px, calc(100% - 32px));
        margin: 28px auto 40px;
      }

      .hero {
        display: grid;
        gap: 16px;
        padding: 28px;
        border: 1px solid var(--panel-border);
        border-radius: 32px;
        background: linear-gradient(145deg, rgba(255, 251, 246, 0.9), rgba(244, 239, 231, 0.88));
        box-shadow: var(--shadow);
      }

      .hero-top {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
      }

      .hero-copy {
        max-width: 760px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        color: var(--brand);
        background: var(--brand-soft);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      h1,
      h2,
      h3,
      h4,
      p {
        margin: 0;
      }

      h1 {
        margin-top: 14px;
        font-size: clamp(34px, 5vw, 56px);
        line-height: 1.06;
      }

      .hero-copy p {
        margin-top: 14px;
        max-width: 720px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.7;
      }

      .hero-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      .hero-link {
        padding: 12px 16px;
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        background: rgba(255, 250, 244, 0.72);
        text-decoration: none;
        color: var(--muted);
        font-size: 14px;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .hero-stat {
        padding: 18px;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(67, 53, 39, 0.08);
        background: rgba(255, 250, 244, 0.72);
      }

      .hero-stat strong {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: var(--muted);
      }

      .hero-stat span {
        display: block;
        font-size: 18px;
        line-height: 1.5;
      }

      .workspace {
        display: grid;
        grid-template-columns: 290px minmax(0, 1fr);
        gap: 20px;
        margin-top: 22px;
      }

      .panel {
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-xl);
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .sidebar {
        padding: 20px;
        display: grid;
        gap: 18px;
        align-self: start;
        position: sticky;
        top: 20px;
      }

      .sidebar-section {
        display: grid;
        gap: 12px;
      }

      .sidebar-section h3 {
        font-size: 14px;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .chip-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        width: 100%;
        text-align: left;
        padding: 13px 14px;
        border: 1px solid transparent;
        border-radius: 18px;
        background: rgba(255, 250, 244, 0.82);
        color: var(--text);
        cursor: pointer;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .chip:hover {
        transform: translateY(-1px);
        border-color: rgba(15, 118, 110, 0.24);
      }

      .chip.active {
        border-color: rgba(15, 118, 110, 0.28);
        background: linear-gradient(180deg, rgba(15, 118, 110, 0.14), rgba(255, 250, 244, 0.96));
      }

      .chip strong {
        display: block;
        font-size: 15px;
      }

      .chip span {
        display: block;
        margin-top: 5px;
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
      }

      .viewport-toggle {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .preview-area {
        padding: 20px;
      }

      .preview-header {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: flex-start;
        margin-bottom: 18px;
      }

      .preview-header h2 {
        font-size: clamp(24px, 3vw, 34px);
        line-height: 1.12;
      }

      .preview-header p {
        margin-top: 8px;
        color: var(--muted);
        line-height: 1.6;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 11px 14px;
        border-radius: var(--radius-sm);
        font-size: 13px;
        font-weight: 700;
      }

      .status-pill.ok {
        color: var(--brand);
        background: var(--brand-soft);
      }

      .status-pill.warn {
        color: var(--warn);
        background: var(--warn-soft);
      }

      .status-pill.danger {
        color: var(--danger);
        background: var(--danger-soft);
      }

      .browser-shell {
        margin-top: 10px;
        padding: 14px;
        border-radius: 32px;
        border: 1px solid rgba(67, 53, 39, 0.1);
        background: linear-gradient(180deg, rgba(243, 237, 228, 0.95), rgba(255, 251, 246, 0.94));
      }

      .browser-topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 4px 8px 16px;
      }

      .dots {
        display: inline-flex;
        gap: 8px;
      }

      .dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(67, 53, 39, 0.2);
      }

      .address {
        flex: 1;
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        background: rgba(255, 250, 244, 0.9);
        border: 1px solid rgba(67, 53, 39, 0.08);
        color: var(--muted);
        font-size: 13px;
      }

      .app-frame {
        margin-inline: auto;
        border-radius: 28px;
        border: 1px solid rgba(67, 53, 39, 0.08);
        background: var(--panel-strong);
        overflow: hidden;
        transition: max-width 220ms ease;
      }

      .app-frame[data-viewport="desktop"] {
        max-width: 1060px;
      }

      .app-frame[data-viewport="mobile"] {
        max-width: 420px;
      }

      .app-nav {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 22px;
        border-bottom: 1px solid rgba(67, 53, 39, 0.08);
        background: rgba(253, 248, 241, 0.92);
      }

      .brand {
        display: flex;
        gap: 14px;
        align-items: center;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 16px;
        background: linear-gradient(135deg, #0f766e, #164e63);
        color: #fff;
        display: grid;
        place-items: center;
        font-weight: 800;
      }

      .brand small {
        display: block;
        font-size: 12px;
        color: var(--muted);
      }

      .brand strong {
        display: block;
        margin-top: 4px;
        font-size: 17px;
      }

      .nav-summary {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .nav-summary .summary-pill {
        padding: 10px 12px;
        border-radius: var(--radius-sm);
        background: rgba(15, 118, 110, 0.08);
        color: var(--muted);
        font-size: 12px;
      }

      .frame-body {
        display: grid;
        grid-template-columns: 240px minmax(0, 1fr);
        min-height: 720px;
      }

      .app-frame[data-viewport="mobile"] .frame-body {
        grid-template-columns: 1fr;
      }

      .step-rail {
        padding: 20px;
        border-right: 1px solid rgba(67, 53, 39, 0.08);
        background: linear-gradient(180deg, rgba(249, 241, 232, 0.78), rgba(255, 250, 244, 0.92));
      }

      .app-frame[data-viewport="mobile"] .step-rail {
        border-right: 0;
        border-bottom: 1px solid rgba(67, 53, 39, 0.08);
      }

      .step-rail h4 {
        margin-bottom: 14px;
        font-size: 15px;
      }

      .step-list {
        display: grid;
        gap: 10px;
      }

      .step-item {
        padding: 13px 14px;
        border-radius: 18px;
        border: 1px solid transparent;
        background: rgba(255, 250, 244, 0.72);
      }

      .step-item.active {
        border-color: rgba(15, 118, 110, 0.22);
        background: rgba(15, 118, 110, 0.12);
      }

      .step-item.done {
        background: rgba(15, 118, 110, 0.07);
      }

      .step-item small {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .step-item strong {
        display: block;
        font-size: 15px;
      }

      .screen {
        padding: 24px;
        display: grid;
        gap: 18px;
      }

      .screen-hero {
        display: grid;
        gap: 14px;
        padding: 22px;
        border-radius: 24px;
        background: linear-gradient(160deg, rgba(15, 118, 110, 0.1), rgba(255, 250, 244, 0.94));
        border: 1px solid rgba(15, 118, 110, 0.12);
      }

      .screen-hero p {
        color: var(--muted);
        line-height: 1.7;
      }

      .screen-meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .meta-pill {
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        background: rgba(255, 250, 244, 0.76);
        border: 1px solid rgba(67, 53, 39, 0.08);
        color: var(--muted);
        font-size: 12px;
      }

      .content-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .app-frame[data-viewport="mobile"] .content-grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 18px;
        border-radius: 20px;
        background: rgba(255, 250, 244, 0.84);
        border: 1px solid rgba(67, 53, 39, 0.08);
      }

      .card h4 {
        font-size: 16px;
        margin-bottom: 10px;
      }

      .card p {
        color: var(--muted);
        line-height: 1.65;
      }

      .bullet-list {
        margin: 12px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 10px;
      }

      .bullet-list li {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        color: var(--muted);
        line-height: 1.6;
      }

      .bullet-list li::before {
        content: "";
        width: 8px;
        height: 8px;
        margin-top: 8px;
        border-radius: 50%;
        background: linear-gradient(135deg, #0f766e, #164e63);
        flex: 0 0 auto;
      }

      .cta-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 46px;
        padding: 0 18px;
        border-radius: var(--radius-sm);
        border: 1px solid rgba(67, 53, 39, 0.08);
        background: rgba(255, 250, 244, 0.82);
        color: var(--text);
        font-weight: 700;
      }

      .button.primary {
        border-color: transparent;
        background: linear-gradient(135deg, #0f766e, #115e59);
        color: #fff;
      }

      .signal-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .app-frame[data-viewport="mobile"] .signal-grid {
        grid-template-columns: 1fr;
      }

      .signal {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 250, 244, 0.76);
        border: 1px solid rgba(67, 53, 39, 0.08);
      }

      .signal strong {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
      }

      .signal span {
        color: var(--muted);
        line-height: 1.55;
        font-size: 14px;
      }

      .footnote {
        margin-top: 18px;
        padding: 16px 18px;
        border-radius: 18px;
        background: rgba(255, 250, 244, 0.78);
        border: 1px dashed rgba(67, 53, 39, 0.16);
        color: var(--muted);
        line-height: 1.65;
      }

      @media (max-width: 1024px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
        }

        .hero-top,
        .preview-header,
        .app-nav {
          flex-direction: column;
        }

        .nav-summary {
          justify-content: flex-start;
        }
      }

      @media (max-width: 760px) {
        .page {
          width: min(100% - 20px, 1360px);
          margin-top: 18px;
        }

        .hero,
        .sidebar,
        .preview-area {
          padding: 18px;
        }

        .hero-grid,
        .content-grid,
        .signal-grid {
          grid-template-columns: 1fr;
        }

        .browser-shell {
          padding: 10px;
          border-radius: 24px;
        }

        .screen {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="hero">
        <div class="hero-top">
          <div class="hero-copy">
            <div class="eyebrow">HTML Mock / User Review</div>
            <h1>Web setup/admin 用户视角原型</h1>
            <p>
              这份原型只回答一件事：普通用户在 setup 和 admin
              里，第一眼应该看到什么、下一步应该点什么、什么信息该被折叠。它不是技术面板，也不是最终视觉稿。
            </p>
          </div>
          <div class="hero-links">
            <a class="hero-link" href="./web-onboarding-admin-user-view.md">打开用户视角文档</a>
            <a class="hero-link" href="./web-onboarding-admin-workflow-prd.md">打开流程 PRD</a>
          </div>
        </div>
        <div class="hero-grid">
          <div class="hero-stat">
            <strong>这版重点</strong>
            <span>把“先能用，再慢慢补全”做成显式状态，而不是让用户一直卡在“未完成首次配置”。</span>
          </div>
          <div class="hero-stat">
            <strong>页面对象</strong>
            <span>对用户统一写“飞书应用”，不再把内部实现术语直接当作页面对象名。</span>
          </div>
          <div class="hero-stat">
            <strong>查看方式</strong>
            <span>左侧切场景，右侧切桌面/手机预览；每个屏只保留当前任务需要的信息层级。</span>
          </div>
        </div>
      </section>

      <section class="workspace">
        <aside class="sidebar panel">
          <div class="sidebar-section">
            <h3>场景</h3>
            <div class="chip-list" id="scenario-list"></div>
          </div>
          <div class="sidebar-section">
            <h3>预览</h3>
            <div class="viewport-toggle" id="viewport-toggle"></div>
          </div>
          <div class="sidebar-section">
            <h3>当前场景里的页面</h3>
            <div class="chip-list" id="screen-list"></div>
          </div>
        </aside>

        <main class="preview-area panel">
          <div class="preview-header">
            <div>
              <h2 id="preview-title"></h2>
              <p id="preview-subtitle"></p>
            </div>
            <div id="preview-status"></div>
          </div>

          <div class="browser-shell">
            <div class="browser-topbar">
              <div class="dots">
                <span></span>
                <span></span>
                <span></span>
              </div>
              <div class="address" id="preview-address"></div>
            </div>
            <div class="app-frame" id="app-frame" data-viewport="desktop">
              <div class="app-nav">
                <div class="brand">
                  <div class="brand-mark">CR</div>
                  <div>
                    <small id="nav-kicker"></small>
                    <strong id="nav-title"></strong>
                  </div>
                </div>
                <div class="nav-summary" id="nav-summary"></div>
              </div>
              <div class="frame-body">
                <aside class="step-rail">
                  <h4 id="step-rail-title"></h4>
                  <div class="step-list" id="step-list"></div>
                </aside>
                <section class="screen">
                  <div class="screen-hero">
                    <div class="screen-meta" id="screen-meta"></div>
                    <h3 id="screen-title"></h3>
                    <p id="screen-body"></p>
                    <div class="cta-row" id="cta-row"></div>
                  </div>
                  <div class="signal-grid" id="signal-grid"></div>
                  <div class="content-grid" id="content-grid"></div>
                  <div class="footnote" id="screen-footnote"></div>
                </section>
              </div>
            </div>
          </div>
        </main>
      </section>
    </div>

    <script>
      const scenarios = [
        {
          id: "blocked",
          label: "环境阻断",
          short: "先停在环境检查页",
          route: "/setup",
          navKicker: "Setup / 环境门槛",
          summary: ["不出现飞书应用配置入口", "主按钮只剩重新检查", "技术细节不默认铺满页面"],
          screens: [
            {
              id: "blocked-env",
              tab: "环境未通过",
              pageTitle: "先把这台机器准备好",
              subtitle: "基础环境没过时，setup 不该继续带用户去碰飞书应用。",
              status: { tone: "danger", label: "当前不能继续" },
              stepRailTitle: "本次 setup",
              steps: [
                { title: "环境检查", state: "active" },
                { title: "现状确认", state: "pending" },
                { title: "接入飞书应用", state: "pending" },
                { title: "能力检查", state: "pending" },
                { title: "机器设置", state: "pending" },
              ],
              meta: ["用户第一步", "阻断型页面", "不暴露后续步骤正文"],
              title: "这台机器还不能开始配置飞书应用",
              body: "页面先把阻断项说清楚，用户修好以后再回来继续。默认只展示能直接执行的下一步，不把内部检测字段铺在首屏。",
              actions: [
                { label: "重新检查环境", primary: true },
                { label: "查看修复说明" },
              ],
              signals: [
                { title: "阻断项 1", body: "没有检测到 Codex。先安装或确认环境变量。" },
                { title: "阻断项 2", body: "运行环境检查没有通过。当前机器还不能稳定运行会话。" },
                { title: "页面规则", body: "这里不出现“新建飞书应用”或“接入已有飞书应用”入口。" },
              ],
              panels: [
                {
                  title: "用户此刻应该看到什么",
                  body: "清楚的阻断状态、一句话原因、两个能执行的下一步。",
                  bullets: ["标题只讲结果，不讲内部检测模型", "错误详情收进修复说明，不占主界面", "不让用户在坏地基上继续填表"],
                },
                {
                  title: "为什么这样摆",
                  body: "先把“能不能开始”回答掉，用户就不会把机器问题误解成飞书应用问题。",
                  bullets: ["setup 入口更像开通向导", "主 CTA 聚焦在恢复可继续状态", "手机端首屏也能看完核心信息"],
                },
              ],
              footnote: "这个场景的关键不是“信息完整”，而是马上告诉用户：先修机器，再谈飞书应用。",
            },
          ],
        },
        {
          id: "fresh",
          label: "首次接入",
          short: "从零接入一个飞书应用",
          route: "/setup",
          navKicker: "Setup / 首次接入",
          summary: ["先确认环境，再看当前现状", "一次只处理一个飞书应用", "可选增强项不阻断完成"],
          screens: [
            {
              id: "fresh-ready",
              tab: "环境通过",

      const state = {
        scenarioId: scenarios[1].id,
        screenId: scenarios[1].screens[0].id,
        viewport: "desktop",
      };

      function getScenario() {
        return scenarios.find((item) => item.id === state.scenarioId);
      }

      function getScreen() {
        const scenario = getScenario();
        return scenario.screens.find((item) => item.id === state.screenId);
      }

      function el(tag, className, text) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text) node.textContent = text;
        return node;
      }

      function renderScenarioList() {
        const container = document.getElementById("scenario-list");
        container.innerHTML = "";
        scenarios.forEach((scenario) => {
          const button = el("button", `chip${scenario.id === state.scenarioId ? " active" : ""}`);
          button.type = "button";
          button.addEventListener("click", () => {
            state.scenarioId = scenario.id;
            state.screenId = scenario.screens[0].id;
            render();
          });
          button.append(el("strong", "", scenario.label));
          button.append(el("span", "", scenario.short));
          container.append(button);
        });
      }

      function renderViewportToggle() {
        const options = [
          { id: "desktop", label: "桌面预览", hint: "宽屏壳体" },
          { id: "mobile", label: "手机预览", hint: "窄屏单列" },
        ];
        const container = document.getElementById("viewport-toggle");
        container.innerHTML = "";
        options.forEach((option) => {
          const button = el("button", `chip${option.id === state.viewport ? " active" : ""}`);
          button.type = "button";
          button.addEventListener("click", () => {
            state.viewport = option.id;
            render();
          });
          button.append(el("strong", "", option.label));
          button.append(el("span", "", option.hint));
          container.append(button);
        });
      }

      function renderScreenList() {
        const scenario = getScenario();
        const container = document.getElementById("screen-list");
        container.innerHTML = "";
        scenario.screens.forEach((screen) => {
          const button = el("button", `chip${screen.id === state.screenId ? " active" : ""}`);
          button.type = "button";
          button.addEventListener("click", () => {
            state.screenId = screen.id;
            render();
          });
          button.append(el("strong", "", screen.tab));
          button.append(el("span", "", screen.pageTitle));
          container.append(button);
        });
      }

      function renderMain() {
        const scenario = getScenario();
        const screen = getScreen();

        document.getElementById("preview-title").textContent = scenario.label;
        document.getElementById("preview-subtitle").textContent = scenario.short;

        const status = document.getElementById("preview-status");
        status.innerHTML = "";
        const statusPill = el("div", `status-pill ${screen.status.tone}`, screen.status.label);
        status.append(statusPill);

        document.getElementById("preview-address").textContent = `${scenario.route} · ${screen.pageTitle}`;
        document.getElementById("nav-kicker").textContent = scenario.navKicker;
        document.getElementById("nav-title").textContent = screen.pageTitle;

        const navSummary = document.getElementById("nav-summary");
        navSummary.innerHTML = "";
        scenario.summary.forEach((item) => {
          navSummary.append(el("div", "summary-pill", item));
        });

        const frame = document.getElementById("app-frame");
        frame.setAttribute("data-viewport", state.viewport);

        document.getElementById("step-rail-title").textContent = screen.stepRailTitle;

        const stepList = document.getElementById("step-list");
        stepList.innerHTML = "";
        screen.steps.forEach((step, index) => {
          const node = el("div", `step-item ${step.state}`);
          node.append(el("small", "", `步骤 ${index + 1}`));
          node.append(el("strong", "", step.title));
          stepList.append(node);
        });

        const meta = document.getElementById("screen-meta");
        meta.innerHTML = "";
        screen.meta.forEach((item) => meta.append(el("span", "meta-pill", item)));

        document.getElementById("screen-title").textContent = screen.title;
        document.getElementById("screen-body").textContent = screen.body;

        const ctaRow = document.getElementById("cta-row");
        ctaRow.innerHTML = "";
        screen.actions.forEach((action) => {
          ctaRow.append(el("button", `button${action.primary ? " primary" : ""}`, action.label));
        });

        const signalGrid = document.getElementById("signal-grid");
        signalGrid.innerHTML = "";
        screen.signals.forEach((signal) => {
          const card = el("div", "signal");
          card.append(el("strong", "", signal.title));
          card.append(el("span", "", signal.body));
          signalGrid.append(card);
        });

        const contentGrid = document.getElementById("content-grid");
        contentGrid.innerHTML = "";
        screen.panels.forEach((panel) => {
          const card = el("section", "card");
          card.append(el("h4", "", panel.title));
          card.append(el("p", "", panel.body));
          const list = el("ul", "bullet-list");
          panel.bullets.forEach((item) => list.append(el("li", "", item)));
          card.append(list);
          contentGrid.append(card);
        });

        document.getElementById("screen-footnote").textContent = screen.footnote;
      }

      function render() {
        renderScenarioList();
        renderViewportToggle();
        renderScreenList();
        renderMain();
      }

      render();
    </script>
